<!DOCTYPE html>
<html>
<head>
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <style>
        body {
            margin: 0; padding: 0; height: 100vh;
            background: linear-gradient(135deg, #fbc2eb 0%, #a6c1ee 100%);
            display: flex; justify-content: center; align-items: center; font-family: 'Arial', sans-serif;
        }
        .profile-card {
            background: rgba(255, 255, 255, 0.2);
            padding: 45px; border-radius: 20px; text-align: center;
            color: white; backdrop-filter: blur(15px); 
            border: 1px solid rgba(255,255,255,0.3);
            width: 280px; box-shadow: 0 8px 32px 0 rgba(31, 38, 135, 0.2);
        }
        h2 { font-weight: 300; margin-bottom: 10px; font-size: 1.2em; opacity: 0.9; }
        .user-id { font-size: 2.2em; font-weight: bold; margin-bottom: 40px; display: block; letter-spacing: 1px; }
        .logout-btn {
            text-decoration: none; color: #3b5998; background: white;
            padding: 12px 35px; border-radius: 8px; font-weight: bold; font-size: 0.9em;
            transition: 0.3s; display: inline-block;
        }
        .logout-btn:hover { background: #f0f0f0; transform: translateY(-3px); }
    </style>
</head>
<body>
    <div class="profile-card">
        <h2>Welcome Back!</h2>
        <span class="user-id">{{ user_id }}</span>
        <a href="/logout" class="logout-btn">LOGOUT</a>
    </div>
</body>
</html>
