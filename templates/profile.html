<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <title>프로필 - Jizero</title>
    <style>
        body { margin: 0; background: linear-gradient(135deg, #667eea 0%, #764ba2 100%); height: 100vh; display: flex; justify-content: center; align-items: center; font-family: 'Segoe UI', sans-serif; }
        .container { background: rgba(255, 255, 255, 0.1); backdrop-filter: blur(10px); padding: 50px; border-radius: 20px; color: white; text-align: center; border: 1px solid rgba(255, 255, 255, 0.18); width: 380px; }
        .profile-pic { width: 80px; height: 80px; background: rgba(255,255,255,0.2); border-radius: 50%; margin: 0 auto 20px; display: flex; align-items: center; justify-content: center; font-size: 40px; }
        .logout-btn { display: inline-block; margin-top: 30px; padding: 10px 25px; background: rgba(255,255,255,0.2); color: white; text-decoration: none; border-radius: 30px; border: 1px solid white; transition: 0.3s; }
        .logout-btn:hover { background: white; color: #764ba2; }
    </style>
</head>
<body>
    <div class="container">
        <div class="profile-pic">👤</div>
        <h1>Welcome!</h1>
        <p style="font-size: 1.2em;"><strong>{{ user_id }}</strong>님, 반갑습니다.</p>
        <p style="opacity: 0.7;">성공적으로 로그인되었습니다.</p>
        <a href="{{ url_for('logout') }}" class="logout-btn">Logout</a>
    </div>
</body>
</html>
