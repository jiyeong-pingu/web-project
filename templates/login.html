<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>로그인 - Jizero</title>
    <style>
        body { margin: 0; background: linear-gradient(135deg, #667eea 0%, #764ba2 100%); height: 100vh; display: flex; justify-content: center; align-items: center; font-family: 'Segoe UI', sans-serif; }
        .container { background: rgba(255, 255, 255, 0.1); backdrop-filter: blur(10px); padding: 40px; border-radius: 20px; width: 350px; color: white; text-align: center; border: 1px solid rgba(255, 255, 255, 0.18); box-shadow: 0 8px 32px 0 rgba(31, 38, 135, 0.37); }
        h2 { margin-bottom: 30px; font-weight: 300; letter-spacing: 2px; }
        input { width: 100%; padding: 12px; background: rgba(255, 255, 255, 0.2); border: none; border-radius: 8px; color: white; outline: none; box-sizing: border-box; margin-bottom: 20px; }
        button { width: 100%; padding: 12px; background: #ffffff; color: #764ba2; border: none; border-radius: 8px; font-weight: bold; cursor: pointer; transition: 0.3s; }
        .flash-msg { background: rgba(255, 255, 255, 0.2); padding: 10px; border-radius: 8px; margin-bottom: 20px; font-size: 0.85em; }
    </style>
</head>
<body>
    <div class="container">
        <h2>LOGIN</h2>
        {% with messages = get_flashed_messages() %}
          {% if messages %}<div class="flash-msg">{{ messages[0] }}</div>{% endif %}
        {% endwith %}
        <form method="POST">
            <input type="text" name="username" placeholder="Username" required>
            <input type="password" name="password" placeholder="Password" required>
            <button type="submit">SIGN IN</button>
        </form>
        <p style="margin-top: 20px; font-size: 0.8em;">New? <a href="{{ url_for('signup') }}" style="color: white;">Sign Up</a></p>
    </div>
</body>
</html>
