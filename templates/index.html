<!DOCTYPE html>
<html>
<head>
    <style>
        body {
            margin: 0; padding: 0; height: 100vh;
            background: linear-gradient(135deg, #fbc2eb 0%, #a6c1ee 100%);
            display: flex; flex-direction: column; justify-content: center; align-items: center;
            color: white; font-family: 'Arial', sans-serif;
        }
        h1 { font-size: 3.5em; margin-bottom: 40px; font-weight: 300; }
        .btn-group a {
            padding: 15px 40px; margin: 10px; background: rgba(255,255,255,0.2);
            color: white; text-decoration: none; border: 1px solid white;
            font-weight: bold; display: inline-block; transition: 0.3s;
        }
        .btn-group a:hover { background: white; color: #3b5998; }
    </style>
</head>
<body>
    <h1>Welcome</h1>
    <div class="btn-group">
        <a href="/login">LOGIN</a>
        <a href="/signup">SIGN UP</a>
    </div>
</body>
</html>
